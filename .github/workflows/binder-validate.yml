name: Binder dashboard validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Compile
        run: python -m compileall lib apps tests
      - name: Test
        run: pytest
      - name: Execute dashboard notebooks
        run: |
          jupyter nbconvert --to notebook --execute --stdout apps/campaign/index.ipynb >/tmp/aicr-campaign-executed.ipynb
          jupyter nbconvert --to notebook --execute --stdout apps/studies/index.ipynb >/tmp/aicr-studies-executed.ipynb
